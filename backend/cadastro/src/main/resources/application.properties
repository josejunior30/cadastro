spring.application.name=cadastro


spring.profiles.active=${APP_PROFILE:test}
spring.jpa.open-in-view=false

app.jwt.expiration-seconds=900

app.jwt.private-key=classpath:keys/private.pem
app.jwt.public-key=classpath:keys/public.pem

pluggy.base-url=https://api.pluggy.ai
pluggy.client-id=${PLUGGY_CLIENT_ID}
pluggy.client-secret=${PLUGGY_CLIENT_SECRET}
pluggy.oauth-redirect-url=http://localhost:4200/pluggy/callback
pluggy.include-sandbox=true


