<div>
  <div>
    <h1>Login</h1>
    <p>Acesse sua conta para continuar</p>

    <form (ngSubmit)="entrar()">
      <div>
        <label>Email</label>
        <input
          type="email"
          name="email"
          [(ngModel)]="email"
          placeholder="Digite seu email"
        />
      </div>

      <div>
        <label>Senha</label>
        <input
          type="password"
          name="senha"
          [(ngModel)]="senha"
          placeholder="Digite sua senha"
        />
      </div>

      <div *ngIf="erro">
        {{ erro }}
      </div>

      <button type="submit" [disabled]="carregando">
        {{ carregando ? 'Entrando...' : 'Entrar' }}
      </button>
    </form>
  </div>
</div>
